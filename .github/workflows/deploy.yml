name: Deploy — Portfolio Brandon Kamga

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    name: Build, push & deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            brandonkamga237/myporfolio:latest
            brandonkamga237/myporfolio:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Upload compose.yaml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host:      ${{ secrets.VPS_HOST }}
          username:  ${{ secrets.VPS_USER }}
          key:       ${{ secrets.VPS_SSH_KEY }}
          source:    "compose.yaml"
          target:    "/root/portfolio/"
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:            ${{ secrets.VPS_HOST }}
          username:        ${{ secrets.VPS_USER }}
          key:             ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -euo pipefail
            cd /root/portfolio

            echo "→ Pulling latest image..."
            docker pull brandonkamga237/myporfolio:latest

            echo "→ Ensuring traefik-public network exists..."
            docker network inspect traefik-public >/dev/null 2>&1 || \
              docker network create traefik-public

            echo "→ Starting portfolio..."
            docker compose up -d --force-recreate --remove-orphans portfolio

            echo "→ Status:"
            docker compose ps
